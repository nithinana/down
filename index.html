<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Site Moved</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --card: #111111;
      --surface: #1a1a1a;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.4);
      --faint: rgba(255,255,255,0.12);
      --r: 18px;
      --r-sm: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 32px 36px;
      text-align: center;
    }

    .icon-badge {
      width: 58px;
      height: 58px;
      background: var(--faint);
      border-radius: 16px;
      display: inline-grid;
      place-items: center;
      margin: 0 auto 24px;
    }

    .icon-badge svg {
      width: 24px;
      height: 24px;
      opacity: 0.7;
    }

    h1 {
      font-size: 1.45rem;
      font-weight: 900;
      letter-spacing: -.3px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.875rem;
      line-height: 1.55;
      margin-bottom: 32px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin-bottom: 28px;
    }

    .contact-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .7px;
      margin-bottom: 10px;
    }

    .contact-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px 16px;
      cursor: pointer;
      transition: border-color .18s, background .18s;
      text-decoration: none;
      margin-bottom: 10px;
    }

    .contact-row:hover {
      border-color: var(--border-hover);
      background: rgba(255,255,255,0.07);
    }

    .contact-row:active {
      transform: scale(0.98);
    }

    .contact-icon {
      opacity: 0.45;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .contact-icon svg { width: 15px; height: 15px; }

    .contact-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: var(--text);
      opacity: 0.75;
    }

    .or-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0;
      color: var(--muted);
      font-size: 11px;
    }

    .or-row::before, .or-row::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .footer-note {
      margin-top: 28px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.15);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="icon-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </div>

    <h1>there is no site here</h1>
    <p class="subtitle">
      the page you're looking for is no longer here.<br>
    </p>

    <div class="divider"></div>

    <div class="contact-label">contact</div>

    <a class="contact-row" href="mailto:admin@thirai.me">
      <span class="contact-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
      </span>
      <span class="contact-text">admin@thirai.me</span>
    </a>

    <div class="or-row">or</div>

    <div class="contact-row" style="cursor:default;">
      <span class="contact-text">if you know me, just msg me and ill tell yu whats happening</span>
    </div>

  </div>
</body>
</html>
